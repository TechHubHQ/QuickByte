root = "."

# Directories for temporary files
testdata_dir = "testdata"
tmp_dir = "tmp"

# Main entry point for the app
main = "server.go"

[build]
cmd = "go build -o ./tmp/main.exe ."
bin = "tmp/main.exe"  # Use forward slashes
full_bin = "./tmp/main.exe"

# Delay before restarting after changes (milliseconds)
delay = 1000

# Exclude specific directories from watching
exclude_dir = ["assets", "tmp", "vendor", "testdata", "Docs", "Frontend", ".local", ".idx", ".idea", ".github"]

# Exclude specific files and patterns
exclude_file = []
exclude_regex = ["_test.go"]

# Include directories and extensions to watch for changes
include_dir = ["Backend/**"]
include_ext = ["go", "tpl", "tmpl"]

# Additional settings
kill_delay = "0s"
log = "build-errors.log"
poll = false
poll_interval = 0
rerun_delay = 500
stop_on_error = false

[color]
app = "QuickByte"
build = "yellow"
main = "magenta"
runner = "green"
watcher = "cyan"

[log]
main_only = false
time = false

[misc]
clean_on_exit = false

[proxy]
app_port = 0
enabled = false
proxy_port = 0

[screen]
clear_on_rebuild = false
keep_scroll = true
